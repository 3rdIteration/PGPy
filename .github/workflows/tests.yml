name: Tox Tests
on: [push, pull_request]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  # Test with python-cryptography as primary backend
  test-cryptography:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Rust (for cryptography build on newer Python)
        if: matrix.python-version == '3.13' || matrix.python-version == '3.14'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Install dependencies (cryptography only)
        run: |
          pip install --upgrade pip
          pip install 'cryptography>=45.0' pyasn1 pytest pycryptodomex ecdsa pytest-order
          pip install -e .
      - name: Verify backend
        run: python -c "from pgpy._backend import BACKEND; assert BACKEND == 'cryptography', f'Expected cryptography, got {BACKEND}'"
      - name: Run tests
        run: CI='' python -m pytest tests/ -v --tb=short
        env:
          CI: ''

  # Test with pycryptodomex as fallback backend
  test-pycryptodomex:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies (pycryptodomex only, no cryptography)
        run: |
          pip install --upgrade pip
          pip install 'pycryptodomex>=3.23' pyasn1 'ecdsa>=0.19' pytest pytest-order
          pip install --no-deps -e .
          # Ensure cryptography is NOT installed
          pip uninstall -y cryptography 2>/dev/null || true
      - name: Verify backend
        run: python -c "from pgpy._backend import BACKEND; assert BACKEND == 'pycryptodomex', f'Expected pycryptodomex, got {BACKEND}'"
      - name: Run tests
        run: CI='' python -m pytest tests/ -v --tb=short 2>&1 | tee /tmp/test_output.txt
        env:
          CI: ''
      - name: Show test failures
        if: failure()
        run: grep -A5 "FAILED\|ERROR" /tmp/test_output.txt || cat /tmp/test_output.txt | tail -100

  # Test with both backends installed (cryptography should be preferred)
  test-both-backends:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies (both backends)
        run: |
          pip install --upgrade pip
          pip install 'cryptography>=45.0' 'pycryptodomex>=3.23' pyasn1 'ecdsa>=0.19' pytest pytest-order
          pip install -e .
      - name: Verify backend preference
        run: python -c "from pgpy._backend import BACKEND, _has_cryptography, _has_pycryptodomex; assert _has_cryptography and _has_pycryptodomex; assert BACKEND == 'cryptography'"
      - name: Run tests
        run: CI='' python -m pytest tests/ -v --tb=short
        env:
          CI: ''

  # Backend-specific tests
  test-backend-specific:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install all backends
        run: |
          pip install --upgrade pip
          pip install 'cryptography>=45.0' 'pycryptodomex>=3.23' pyasn1 'ecdsa>=0.19' pytest pytest-order
          pip install -e .
      - name: Run backend-specific tests
        run: CI='' python -m pytest tests/test_backend.py tests/test_ecdsa_fallback.py -v
        env:
          CI: ''

  # add a pep8 test
  pep8:
    runs-on: ubuntu-latest
    continue-on-error: true # pep8 failures shouldn't be considered fatal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install tox
        run: pip install --upgrade pip && pip install tox
      - name: Run tox
        run: tox -e pep8
